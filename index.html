<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debt Freedom Tracker</title>
  <style>
    /* Premium Dark Gray Theme Config */
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --color-background-primary: #1E1E24;     /* Dark Gray Card Background */
      --color-background-secondary: #121214;   /* Darker Gray Page Background */
      --color-border-secondary: #2D2D34;
      --color-border-tertiary: #25252A;
      --color-text-primary: #FFFFFF;
      --color-text-secondary: #A0AEC0;
      --color-text-tertiary: #718096;
      --color-text-danger: #FC8181;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-sans);background:var(--color-background-secondary);color:var(--color-text-primary);padding:20px}
    .app{width:100%;max-width:800px;margin:0 auto;padding:0.5rem 0}
    .top-banner{background:#2D2D3A;border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;border:1px solid var(--color-border-secondary)}
    .top-banner h1{color:#fff;font-size:15px;font-weight:500}
    .banner-stats{display:flex;gap:12px;flex-wrap:wrap}
    .bstat{background:rgba(255,255,255,0.05);border-radius:var(--border-radius-md);padding:6px 12px;text-align:center;border:1px solid rgba(255,255,255,0.05)}
    .bstat .val{color:#F39C12;font-size:16px;font-weight:500}
    .bstat .lbl{color:rgba(255,255,255,0.5);font-size:10px;margin-top:1px}
    .tab-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1rem;overflow-x:auto;padding-bottom:2px}
    .tab-btn{padding:6px 14px;border-radius:var(--border-radius-md);border:1px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
    .tab-btn.active{background:#FFFFFF;color:#121214;border-color:#FFFFFF;font-weight:600}
    .tab-btn.red{border-left:3px solid #E53E3E}
    .tab-btn.orange{border-left:3px solid #DD6B20}
    .tab-btn.yellow{border-left:3px solid #D69E2E}
    .tab-btn.green{border-left:3px solid #38A169}
    .tab-btn.teal{border-left:3px solid #319795}
    .month-card{background:var(--color-background-primary);border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:1.25rem;box-shadow: 0 4px 6px rgba(0,0,0,0.2)}
    .month-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
    .month-title{font-size:18px;font-weight:500;color:var(--color-text-primary)}
    .month-quote{font-size:12px;color:var(--color-text-secondary);font-style:italic;margin-top:4px;max-width:400px}
    .status-badge{padding:5px 14px;border-radius:99px;font-size:11px;font-weight:500;white-space:nowrap}
    .progress-section{margin-bottom:1.25rem}
    .progress-label{display:flex;justify-content:space-between;margin-bottom:6px}
    .progress-label span{font-size:12px;color:var(--color-text-secondary)}
    .progress-label strong{font-size:12px;font-weight:500;color:var(--color-text-primary)}
    .progress-bar-track{height:10px;background:#2D2D34;border-radius:99px;overflow:hidden}
    .progress-bar-fill{height:100%;border-radius:99px;transition:width .4s ease}
    .cutoffs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem}
    @media(max-width:520px){.cutoffs{grid-template-columns:1fr}}
    .cutoff-card{background:#25252A;border-radius:var(--border-radius-md);padding:1rem;border:1px solid var(--color-border-secondary)}
    .cutoff-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:10px;display:flex;justify-content:space-between}
    .cutoff-budget{font-size:11px;color:var(--color-text-tertiary)}
    .expense-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--color-border-tertiary)}
    .expense-row:last-child{border-bottom:none}
    .exp-name{font-size:12px;color:var(--color-text-primary)}
    .exp-amount{font-size:12px;font-weight:500;color:var(--color-text-secondary)}
    .input-row{display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid var(--color-border-secondary)}
    .input-row label{font-size:11px;color:var(--color-text-secondary);flex-shrink:0}
    .input-row input{flex:1;padding:5px 8px;font-size:12px;border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);min-width:0}
    .pay-btn{padding:5px 10px;font-size:11px;border-radius:var(--border-radius-md);border:1px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);cursor:pointer;white-space:nowrap}
    .pay-btn:hover{background:var(--color-border-secondary);color:#FFF}
    .paid-tag{font-size:10px;padding:2px 7px;border-radius:99px;background:#1C3D27;color:#48BB78;font-weight:500;white-space:nowrap}
    .cutoff-total{display:flex;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--color-border-secondary);font-size:12px}
    .cutoff-remaining{font-size:11px;margin-top:4px;text-align:right}
    .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.25rem}
    .scard{background:#25252A;border-radius:var(--border-radius-md);padding:10px 12px;border:1px solid var(--color-border-secondary)}
    .scard .sv{font-size:18px;font-weight:500;color:var(--color-text-primary)}
    .scard .sl{font-size:10px;color:var(--color-text-secondary);margin-top:2px}
    .big-green{background:#1C3D27;border-radius:var(--border-radius-lg);padding:1.5rem;text-align:center;margin-bottom:1.25rem;border:1px solid #27AE60}
    .big-green h2{font-size:22px;font-weight:500;color:#48BB78}
    .big-green p{font-size:13px;color:#C6F6D5;margin-top:6px}
    .savings-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--color-border-tertiary)}
    .savings-row:last-child{border-bottom:none}
    .sav-cat{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--color-text-primary)}
    .sav-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .sav-amount{font-size:13px;font-weight:500;color:var(--color-text-secondary)}
    .sav-input-wrap{display:flex;align-items:center;gap:6px}
    .sav-input{width:90px;padding:4px 8px;font-size:12px;border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);text-align:right}
    .net-row{margin-top:10px;padding-top:10px;border-top:1px solid var(--color-border-secondary);display:flex;justify-content:space-between;align-items:center}
    .net-row .lbl{font-size:12px;color:var(--color-text-secondary)}
    .net-row .val{font-size:16px;font-weight:500}
    .timeline-strip{display:flex;gap:0;margin-bottom:1rem;border-radius:var(--border-radius-md);overflow:hidden;height:32px;border:1px solid var(--color-border-secondary)}
    .tl-seg{flex:1;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;color:#fff;cursor:pointer;transition:opacity .15s}
    .tl-seg:hover{opacity:0.8}
    .section-lbl{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px;margin-top:1rem;text-transform:uppercase;letter-spacing:0.04em}
    .overall-bar-wrap{margin-bottom:1.25rem}
  </style>
</head>
<body>

<div class="app">

      <h1>Debt Freedom Tracker &nbsp;·&nbsp; 2026–2027</h1>

   cats:[{name:'Rent',color:'#2980B9',amount:6000},{name:'Emergency fund',color:'#27AE60',amount:5000},{name:'Savings / invest',color:'#1ABC9C',amount:5000},{name:'Lifestyle',color:'#8E44AD',amount:4000}],focus:'Build emergency fund — target ₱20,000'},

  {id:'jul27',label:'Jul 2027',color:'teal',phase:'growth',quote:'"You\'re building wealth now."',
   cats:[{name:'Rent',color:'#2980B9',amount:6000},{name:'Emergency fund',color:'#27AE60',amount:7000},{name:'Savings / invest',color:'#1ABC9C',amount:5000},{name:'Lifestyle',color:'#8E44AD',amount:2000}],focus:'Milestone: ₱50k total savings'},
  {id:'aug27',label:'Aug 2027',color:'teal',phase:'growth',quote:'"The journey becomes the destination."',

];

const ALL_MONTHS = [...MONTHS_DEBT, ...MONTHS_2027];

let state = {
  active: 'jun26',
  payments: {},
  savings: {}
};

function initOrCreateState() {
  const saved = localStorage.getItem('debt_tracker_state');
  if (saved) {
    try {
      state = JSON.parse(saved);
      return;
    } catch(e) {
      console.error("Error loading data:", e);
    }
  }
  
  ALL_MONTHS.forEach(m => {
    if(m.phase === 'debt' || m.phase === 'debtfree'){
      state.payments[m.id] = {};
      m.cutoffs.forEach((c,ci) => {
        state.payments[m.id][ci] = {};
        c.items.forEach((it,ii) => { state.payments[m.id][ci][ii] = {paid:false, amount:it.amt}; });
      });
    } else {
      state.savings[m.id] = {};
      m.cats.forEach((c,i) => { state.savings[m.id][i] = {actual: c.amount}; });
    }
  });
}

function saveToLocalStorage() {
  localStorage.setItem('debt_tracker_state', JSON.stringify(state));
}

const COLOR_MAP = {red:'#E53E3E',orange:'#DD6B20',yellow:'#D69E2E',green:'#38A169',teal:'#319795'};
const STATUS_MAP = {
  red:{label:'High pressure',bg:'#742A2A',fg:'#FED7D7'},
  orange:{label:'Transition',bg:'#7B341E',fg:'#FEEBC8'},
  yellow:{label:'Stabilizing',bg:'#744210',fg:'#FEFCBF'},
  green:{label:'Debt free',bg:'#22543D',fg:'#C6F6D5'},
  teal:{label:'Growth phase',bg:'#234E52',fg:'#E6FFFA'}
};

function totalPaid(){
  let t=0;
  MONTHS_DEBT.forEach(m => {
    const mp = state.payments[m.id];
    if(!mp) return;
    m.cutoffs.forEach((c,ci) => c.items.forEach((it,ii) => {
      const p = mp[ci] && mp[ci][ii];
      if(p && p.paid) t += p.amount;
    }));
  });
  return t;
}

function totalSavings(){
  let t=0;
  MONTHS_2027.forEach(m => {
    const ms = state.savings[m.id];
    if(!ms) return;
    m.cats.forEach((c,i) => {
      if(i===0) return;
      const s = ms[i];
      if(s) t += (s.actual || 0);
    });
  });
  return t;
}

function updateBanner(){
  const paid = totalPaid();
  const remaining = Math.max(0, TOTAL_DEBT - paid);
  const pct = Math.round((paid/TOTAL_DEBT)*100);
  const sav = totalSavings();
  document.getElementById('b-total-paid').textContent = '₱'+paid.toLocaleString();
  document.getElementById('b-remaining').textContent = '₱'+remaining.toLocaleString();
  document.getElementById('b-pct').textContent = pct+'%';
  document.getElementById('b-savings').textContent = '₱'+sav.toLocaleString();
  renderTimeline();
}

function renderTimeline(){
  const strip = document.getElementById('tl-strip');
  strip.innerHTML = '';
  ALL_MONTHS.forEach(m => {
    const seg = document.createElement('div');
    seg.className='tl-seg';
    seg.style.background = COLOR_MAP[m.color] || '#888';
    seg.style.opacity = m.id === state.active ? '1' : '0.4';
    seg.style.fontSize = '8px';
    seg.title = m.label;
    seg.textContent = m.label.replace(' 2026','').replace(' 2027','');
    seg.onclick = () => { state.active = m.id; saveToLocalStorage(); render(); };
    strip.appendChild(seg);
  });
}

function renderTabs(){
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';
  ALL_MONTHS.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn ' + m.color + (m.id===state.active?' active':'');
    btn.textContent = m.label;
    btn.onclick = () => { state.active = m.id; saveToLocalStorage(); render(); };
    bar.appendChild(btn);
  });
}

function renderDebtMonth(m){
  const mp = state.payments[m.id];
  const st = STATUS_MAP[m.color];
  const monthPaid = m.cutoffs.reduce((sum,c,ci) =>
    sum + c.items.reduce((s2,it,ii) => s2 + (mp[ci]&&mp[ci][ii]&&mp[ci][ii].paid ? mp[ci][ii].amount : 0),0), 0);
  const monthTotal = m.cutoffs.reduce((s,c)=>s+c.items.reduce((s2,i)=>s2+i.amt,0),0);
  const pct = monthTotal>0 ? Math.round((monthPaid/monthTotal)*100) : 0;

  const overallPaid = totalPaid();
  const overallPct = Math.round((overallPaid/TOTAL_DEBT)*100);

  let html = `
  <div class="month-card">
    <div class="month-header">
      <div>
        <div class="month-title">${m.label}</div>
        <div class="month-quote">${m.quote}</div>
      </div>
      <div class="status-badge" style="background:${st.bg};color:${st.fg}">${st.label}</div>
    </div>
    <div class="summary-grid">
      <div class="scard"><div class="sv">₱${INCOME.toLocaleString()}</div><div class="sl">Monthly income</div></div>
      <div class="scard"><div class="sv">₱${monthPaid.toLocaleString()}</div><div class="sl">This month paid</div></div>
      <div class="scard"><div class="sv">₱${(monthTotal-monthPaid).toLocaleString()}</div><div class="sl">This month left</div></div>
      <div class="scard"><div class="sv">${pct}%</div><div class="sl">Month progress</div></div>
    </div>
    <div class="overall-bar-wrap">
      <div class="progress-label"><span>Overall debt freedom</span><strong>${overallPct}% · ₱${overallPaid.toLocaleString()} paid</strong></div>
      <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${overallPct}%;background:linear-gradient(90deg,#E53E3E,#DD6B20,#38A169)"></div></div>
    </div>
    <div class="progress-label" style="margin-bottom:6px"><span>This month</span><strong>₱${monthPaid.toLocaleString()} / ₱${monthTotal.toLocaleString()}</strong></div>
    <div class="progress-bar-track" style="margin-bottom:1.25rem"><div class="progress-bar-fill" style="width:${pct}%;background:${COLOR_MAP[m.color]}"></div></div>
    <div class="cutoffs">`;

  m.cutoffs.forEach((c, ci) => {
    const cutoffPaid = c.items.reduce((s,it,ii) => s + (mp[ci]&&mp[ci][ii]&&mp[ci][ii].paid ? mp[ci][ii].amount : 0), 0);
    const remaining = c.budget - cutoffPaid;
    html += `<div class="cutoff-card">
      <div class="cutoff-title"><span>${c.name}</span><span class="cutoff-budget">Budget ₱${c.budget.toLocaleString()}</span></div>`;
    c.items.forEach((it, ii) => {
      const p = mp[ci][ii];
      html += `<div class="expense-row">
        <span class="exp-name">${it.name}</span>
        <div style="display:flex;align-items:center;gap:6px">
          ${p.paid ? `<span class="paid-tag">paid</span><span class="exp-amount" style="text-decoration:line-through;opacity:0.3">₱${p.amount.toLocaleString()}</span>`
          : `<span class="exp-amount">₱${p.amount.toLocaleString()}</span>`}
        </div>
      </div>`;
    });
    html += `<div class="input-row">
      <label>Paid:</label>
      <input type="number" placeholder="amount" id="inp-${m.id}-${ci}" style="width:90px" />
      <button class="pay-btn" onclick="markPaid('${m.id}',${ci})">Mark paid</button>
      <button class="pay-btn" onclick="markAllCutoff('${m.id}',${ci})" style="font-size:10px">All</button>
    </div>
    <div class="cutoff-total"><span style="font-size:12px;color:var(--color-text-secondary)">Paid</span><strong style="font-size:12px">₱${cutoffPaid.toLocaleString()}</strong></div>
    <div class="cutoff-remaining" style="color:${remaining>0?'var(--color-text-danger)':'#48BB78'};font-size:11px">${remaining>0?'₱'+remaining.toLocaleString()+' remaining':'All cleared'}</div>
    </div>`;
  });

  html += `</div>`;
  if(m.phase==='debtfree'){
    html += `<div class="big-green"><h2>You are DEBT FREE!</h2><p>December 2026 — The year ends with zero debt. Every peso from now on works for you.</p></div>`;
  }
  html += `</div>`;
  return html;
}

function renderGrowthMonth(m){
  const ms = state.savings[m.id];
  const st = STATUS_MAP[m.color];
  let actualTotal = m.cats.reduce((s,c,i) => s + (ms[i]?ms[i].actual:c.amount), 0);
  let netGrowth = INCOME - actualTotal;

  let html = `<div class="month-card">
    <div class="month-header">
      <div>
        <div class="month-title">${m.label}</div>
        <div class="month-quote">${m.quote}</div>
      </div>
      <div class="status-badge" style="background:${st.bg};color:${st.fg}">Growth phase</div>
    </div>
    <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:1rem;padding:8px 12px;background:#25252A;border-radius:var(--border-radius-md);border:1px solid var(--color-border-secondary)">${m.focus}</div>
    <div class="summary-grid">
      <div class="scard"><div class="sv">₱${INCOME.toLocaleString()}</div><div class="sl">Income</div></div>
      <div class="scard"><div class="sv">₱${actualTotal.toLocaleString()}</div><div class="sl">Allocated</div></div>
      <div class="scard"><div class="sv" style="color:${netGrowth>=0?'#48BB78':'#FC8181'}">₱${Math.abs(netGrowth).toLocaleString()}</div><div class="sl">${netGrowth>=0?'Unallocated':'Over budget'}</div></div>
      <div class="scard"><div class="sv">₱${totalSavings().toLocaleString()}</div><div class="sl">Total saved (2027)</div></div>
    </div>
    <div class="section-lbl">Budget allocation — edit to track actuals</div>`;

  m.cats.forEach((c,i) => {
    const actual = ms[i] ? ms[i].actual : c.amount;
    const pct = INCOME > 0 ? Math.round((actual/INCOME)*100) : 0;
    html += `<div class="savings-row">
      <div class="sav-cat"><div class="sav-dot" style="background:${c.color}"></div>${c.name}</div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:11px;color:var(--color-text-tertiary)">${pct}%</span>
        <div class="sav-input-wrap">
          <span style="font-size:12px;color:var(--color-text-secondary)">₱</span>
          <input class="sav-input" type="number" value="${actual}" onchange="updateSavings('${m.id}',${i},this.value)" />
        </div>
      </div>
    </div>`;
  });

  const overallPct = Math.round((actualTotal/INCOME)*100);
  html += `<div class="progress-bar-track" style="margin-top:12px;margin-bottom:4px"><div class="progress-bar-fill" style="width:${Math.min(overallPct,100)}%;background:#319795"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--color-text-tertiary)"><span>0%</span><span>${overallPct}% allocated</span><span>100%</span></div>
    <div class="net-row"><span class="lbl">Net unallocated</span><span class="val" id="net-${m.id}" style="color:${netGrowth>=0?'#48BB78':'#FC8181'}">₱${netGrowth.toLocaleString()}</span></div>
  </div>`;
  return html;
}
