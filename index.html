<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debt Freedom Tracker</title>
  <style>
    /* Exact Match Premium Dark Palette */
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --color-background-primary: #1E1E1E;     /* Dark Charcoal Card Background */
      --color-background-secondary: #121212;   /* Deep Sleek Page Background */
      --color-border-secondary: #2D2D2D;       /* Subdued Border Gray */
      --color-border-tertiary: #262626;
      --color-text-primary: #E3E3E3;           /* Clean Off-White Text */
      --color-text-secondary: #AAAAAA;         /* Muted Slate Label Text */
      --color-text-tertiary: #707070;
      --color-text-danger: #FF6B6B;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-sans);background:var(--color-background-secondary);color:var(--color-text-primary);padding:20px}
    .app{width:100%;max-width:800px;margin:0 auto;padding:0.5rem 0}
    .top-banner{background:#1A1A1C;border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;border:1px solid var(--color-border-secondary)}
    .top-banner h1{color:#fff;font-size:15px;font-weight:500}
    .banner-stats{display:flex;gap:12px;flex-wrap:wrap}
    .bstat{background:rgba(255,255,255,0.04);border-radius:var(--border-radius-md);padding:6px 12px;text-align:center;border:1px solid rgba(255,255,255,0.03)}
    .bstat .val{color:#F39C12;font-size:16px;font-weight:500}
    .bstat .lbl{color:var(--color-text-secondary);font-size:10px;margin-top:1px}
    .tab-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1rem;overflow-x:auto;padding-bottom:2px}
    .tab-btn{padding:6px 14px;border-radius:var(--border-radius-md);border:1px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
    .tab-btn.active{background:#E3E3E3;color:#121212;border-color:#E3E3E3;font-weight:600}
    .tab-btn.red{border-left:3px solid #E53E3E}
    .tab-btn.orange{border-left:3px solid #DD6B20}
    .tab-btn.yellow{border-left:3px solid #D69E2E}
    .tab-btn.green{border-left:3px solid #38A169}
    .tab-btn.teal{border-left:3px solid #319795}
    .month-card{background:var(--color-background-primary);border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:1.25rem;box-shadow:0 4px 10px rgba(0,0,0,0.3)}
    .month-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
    .month-title{font-size:18px;font-weight:500;color:var(--color-text-primary)}
    .month-quote{font-size:12px;color:var(--color-text-secondary);font-style:italic;margin-top:4px;max-width:400px}
    .status-badge{padding:5px 14px;border-radius:99px;font-size:11px;font-weight:500;white-space:nowrap}
    .progress-section{margin-bottom:1.25rem}
    .progress-label{display:flex;justify-content:space-between;margin-bottom:6px}
    .progress-label span{font-size:12px;color:var(--color-text-secondary)}
    .progress-label strong{font-size:12px;font-weight:500;color:var(--color-text-primary)}
    .progress-bar-track{height:10px;background:#2A2A2A;border-radius:99px;overflow:hidden}
    .progress-bar-fill{height:100%;border-radius:99px;transition:width .4s ease}
    .cutoffs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem}
    @media(max-width:520px){.cutoffs{grid-template-columns:1fr}}
    .cutoff-card{background:#161616;border-radius:var(--border-radius-md);padding:1rem;border:1px solid var(--color-border-secondary)}
    .cutoff-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:10px;display:flex;justify-content:space-between}
    .cutoff-budget{font-size:11px;color:var(--color-text-tertiary)}
    .expense-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--color-border-tertiary)}
    .expense-row:last-child{border-bottom:none}
    .exp-name{font-size:12px;color:var(--color-text-primary)}
    .exp-amount{font-size:12px;font-weight:500;color:var(--color-text-secondary)}
    .input-row{display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid var(--color-border-secondary)}
    .input-row label{font-size:11px;color:var(--color-text-secondary);flex-shrink:0}
    .input-row input{flex:1;padding:5px 8px;font-size:12px;border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);min-width:0}
    .pay-btn{padding:5px 10px;font-size:11px;border-radius:var(--border-radius-md);border:1px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);cursor:pointer;white-space:nowrap}
    .pay-btn:hover{background:var(--color-border-secondary);color:#FFF}
    .paid-tag{font-size:10px;padding:2px 7px;border-radius:99px;background:#14321A;color:#48BB78;font-weight:500;white-space:nowrap}
    .cutoff-total{display:flex;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--color-border-secondary);font-size:12px}
    .cutoff-remaining{font-size:11px;margin-top:4px;text-align:right}
    .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.25rem}
    .scard{background:#161616;border-radius:var(--border-radius-md);padding:10px 12px;border:1px solid var(--color-border-secondary)}
    .scard .sv{font-size:18px;font-weight:500;color:var(--color-text-primary)}
    .scard .sl{font-size:10px;color:var(--color-text-secondary);margin-top:2px}
    .big-green{background:#14321A;border-radius:var(--border-radius-lg);padding:1.5rem;text-align:center;margin-bottom:1.25rem;border:1px solid #27AE60}
    .big-green h2{font-size:22px;font-weight:500;color:#48BB78}
    .big-green p{font-size:13px;color:#C6F6D5;margin-top:6px}
    .savings-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--color-border-tertiary)}
    .savings-row:last-child{border-bottom:none}
    .sav-cat{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--color-text-primary)}
    .sav-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .sav-amount{font-size:13px;font-weight:500;color:var(--color-text-secondary)}
    .sav-input-wrap{display:flex;align-items:center;gap:6px}
    .sav-input{width:90px;padding:4px 8px;font-size:12px;border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);text-align:right}
    .net-row{margin-top:10px;padding-top:10px;border-top:1px solid var(--color-border-secondary);display:flex;justify-content:space-between;align-items:center}
    .net-row .lbl{font-size:12px;color:var(--color-text-secondary)}
    .net-row .val{font-size:16px;font-weight:500}
    .timeline-strip{display:flex;gap:0;margin-bottom:1rem;border-radius:var(--border-radius-md);overflow:hidden;height:32px;border:1px solid var(--color-border-secondary)}
    .tl-seg{flex:1;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;color:#fff;cursor:pointer;transition:opacity .15s}
    .tl-seg:hover{opacity:0.8}
    .section-lbl{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px;margin-top:1rem;text-transform:uppercase;letter-spacing:0.04em}
    .overall-bar-wrap{margin-bottom:1.25rem}
  </style>
</head>
